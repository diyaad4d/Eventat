
name: Build, Test & Deploy

on:
  push:
    branches: [ main, master, production ]
  pull_request:
    branches: [ main, master, production ]

jobs:
  # Job 1: Build and Test the Server
  test-server:
    name: Test Server
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: |
          cd server
          npm install

      - name: Run tests
        run: |
          cd server
          npm test

  # Job 2: Build and Test the Client
  build-client:
    name: Build Client
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: |
          cd client
          npm install

      - name: Build client
        run: |
          cd client
          npm run build

  # Job 3: Build and Push Docker Images
  docker:
    name: Build & Push Docker Images
    runs-on: ubuntu-latest
    needs: [ test-server, build-client ]

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push Server image
        uses: docker/build-push-action@v5
        with:
          context: ./server
          file: ./server/Dockerfile  # <--- Explicit path added
          push: true
          tags: ${{ secrets.DOCKERHUB_USERNAME }}/eventat-server:latest

      - name: Build and push Client image
        uses: docker/build-push-action@v5
        with:
          context: ./client
          file: ./client/Dockerfile  # <--- Explicit path added
          push: true
          tags: ${{ secrets.DOCKERHUB_USERNAME }}/eventat-client:latest

      - name: Image digest
        run: |
          echo "✅ Docker images pushed successfully!"
          echo "🐳 Server: ${{ secrets.DOCKERHUB_USERNAME }}/eventat-server:latest"
          echo "🐳 Client: ${{ secrets.DOCKERHUB_USERNAME }}/eventat-client:latest"