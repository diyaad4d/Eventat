# Eventat CI/CD Pipeline - Hybrid Workflow
# Purpose: Builds Backend Docker Image + Verifies Frontend Code

name: Build, Test & Deploy

on:
  push:
    branches: [ main, master, production ]
  pull_request:
    branches: [ main, master, production ]

jobs:
  # Job 1: Build and Test the Server (Backend)
  test-server:
    name: Test Server
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: |
          cd server
          npm install

      - name: Run tests
        run: |
          cd server
          npm test

  # Job 2: Build and Test the Client (Frontend)
  build-client:
    name: Build Client
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: |
          cd client
          npm install

      - name: Verify Build (Proof of valid code)
        run: |
          cd client
          npm run build

  # Job 3: Build and Push Docker Images (SERVER ONLY)
  docker:
    name: Build & Push Docker Image
    runs-on: ubuntu-latest
    needs: [test-server, build-client] # Waits for tests to pass

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      # ONLY builds the Server, since client Dockerfile is deleted
      - name: Build and push Server image
        uses: docker/build-push-action@v5
        with:
          context: ./server
          file: ./server/Dockerfile
          push: true
          tags: ${{ secrets.DOCKERHUB_USERNAME }}/eventat-server:latest

      - name: Image digest
        run: |
          echo "✅ Backend Docker image pushed successfully!"
          echo "🐳 Server: ${{ secrets.DOCKERHUB_USERNAME }}/eventat-server:latest"