name: Eventat CI/CD Pipeline

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:

      - name: Checkout Code
        uses: actions/checkout@v3


      - name: Set up Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '18.x'


      - name: Install Server Dependencies
        run: |
          cd server
          npm install


      - name: Run Backend Tests
        run: |
          cd server
          npm test