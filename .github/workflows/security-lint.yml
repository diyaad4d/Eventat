# Eventat CI/CD Pipeline - Non-Functional Workflow
# This workflow handles: Security Scanning & Code Quality
# Purpose: Demonstrates NON-FUNCTIONAL requirements (security, quality, maintainability)

name: Security & Code Quality

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  # Job 1: Security Audit
  security-audit:
    name: Security Vulnerability Scan
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Audit Server Dependencies
        run: |
          cd server
          npm install
          echo "🔒 Scanning server for vulnerabilities..."
          npm audit --audit-level=high || true

      - name: Audit Client Dependencies
        run: |
          cd client
          npm install
          echo "🔒 Scanning client for vulnerabilities..."
          npm audit --audit-level=high || true

  # Job 2: Code Quality with ESLint
  code-quality:
    name: Code Quality Check
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: client/package-lock.json

      - name: Install client dependencies
        run: |
          cd client
          npm install

      - name: Run ESLint
        run: |
          cd client
          echo "📝 Checking code quality with ESLint..."
          npm run lint || true

  # Job 3: Dependency Analysis
  dependency-check:
    name: Dependency Analysis
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Check outdated packages (Server)
        run: |
          cd server
          npm install
          echo "📦 Checking for outdated server packages..."
          npm outdated || true

      - name: Check outdated packages (Client)
        run: |
          cd client
          npm install
          echo "📦 Checking for outdated client packages..."
          npm outdated || true

      - name: Summary
        run: |
          echo "✅ Non-functional checks completed!"
          echo "📊 Security audits, code quality, and dependency analysis finished."
